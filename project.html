<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Attendance Management System</title>
<script src="project.jsx"></script>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#eef2ff,#f8fafc);
    min-height:100vh;
    padding:30px;
    color:#1e293b;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    font-size:40px;
    color:#0f172a;
    margin-bottom:10px;
}

p{
    color:#64748b;
}

.card{
    background:#ffffff;
    border-radius:20px;
    padding:30px;
    margin:25px 0;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    transition:.3s;
}

.card:hover{
    transform:translateY(-3px);
}

h2{
    margin-bottom:20px;
    color:#111827;
}

input{
    width:260px;
    padding:14px;
    border:1px solid #dbeafe;
    border-radius:12px;
    outline:none;
    margin:8px;
    font-size:15px;
    background:#f8fafc;
}

input:focus{
    border-color:#3b82f6;
    box-shadow:0 0 10px rgba(59,130,246,.2);
}

button{
    padding:14px 22px;
    border:none;
    border-radius:12px;
    color:white;
    cursor:pointer;
    font-weight:600;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

.add-btn{
    background:linear-gradient(90deg,#8ddfa6,#3b82f6);
}

.present{
    background:linear-gradient(90deg,#16a34a,#22c55e);
}

.absent{
    background:linear-gradient(90deg,#3aa1ca,#ef4444);
}

.predict{
    background:linear-gradient(90deg,#4be8dd,#9578b0);
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    overflow:hidden;
    border-radius:15px;
}

th{
    background:linear-gradient(90deg,#1cb8c9,#bddb70);
    color:white;
    padding:15px;
    font-size:16px;
}

td{
    padding:15px;
    border-bottom:1px solid #e5e7eb;
    background:white;
}

tr:hover td{
    background:#f8fafc;
}

#percentage{
    font-size:70px;
    font-weight:bold;
    background:linear-gradient(90deg,#76be3e,#a1b7e7);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

#predictionResult{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
    color:#2563eb;
}

#currentDate,
#dateRange{
    margin-top:15px;
    font-size:16px;
    font-weight:500;
}

@media(max-width:768px){

    body{
        padding:15px;
    }

    input{
        width:100%;
    }

    button{
        width:100%;
        margin-top:10px;
    }

    h1{
        font-size:28px;
    }

    #percentage{
        font-size:50px;
    }
}

</style>
</head>

<body>

<div class="container">

<h1>Student Attendance Management System</h1>
<p>Track and manage attendance efficiently</p>

<div class="card">
<h2>Date Information</h2>

<input type="date" id="startDate" onchange="showDateRange()">
<input type="date" id="endDate" onchange="showDateRange()">

<p id="dateRange"></p>
<p id="currentDate"></p>
</div>

<div class="card">

<h2>Add Student</h2>

<input type="text" id="studentName" placeholder="Student Name">

<input type="number" id="studentRoll" placeholder="Roll Number">

<button class="add-btn" onclick="addStudent()">
Add Student
</button>

</div>

<div class="card">

<h2>Mark Attendance</h2>

<table>

<thead>
<tr>
<th>Name</th>
<th>Roll No</th>
<th>Status</th>
</tr>
</thead>

<tbody id="studentTable">

</tbody>

</table>

</div>

<div class="card">

<h2>Current Attendance</h2>

<div id="percentage">0%</div>

</div>

<div class="card">

<h2>Attendance Predictor</h2>

<input type="number"
id="futureDays"
placeholder="Enter Future Classes">

<br><br>

<button class="predict"
onclick="predictPresent()">
If All Present
</button>

<button class="predict"
onclick="predictAbsent()">
If All Absent
</button>

<p id="predictionResult"></p>

</div>

</div>

<script>

let totalClasses = 0;
let presentClasses = 0;

let today = new Date();

document.getElementById("currentDate").innerHTML =
"Today : " +
today.toLocaleDateString('en-US',{
weekday:'long',
year:'numeric',
month:'long',
day:'numeric'
});

function showDateRange(){

let start =
document.getElementById("startDate").value;

let end =
document.getElementById("endDate").value;

if(start && end){

document.getElementById("dateRange").innerHTML =
"Attendance Period : " + start +
" To " + end;

}
}

function addStudent(){

let name =
document.getElementById("studentName").value;

let roll =
document.getElementById("studentRoll").value;

if(name==="" || roll===""){
alert("Fill all details");
return;
}

let row =
document.createElement("tr");

row.innerHTML = `
<td>${name}</td>
<td>${roll}</td>
<td>
<button class="present"
onclick="markAttendance('present')">
Present
</button>

<button class="absent"
onclick="markAttendance('absent')">
Absent
</button>
</td>
`;

document.getElementById("studentTable")
.appendChild(row);

document.getElementById("studentName").value="";
document.getElementById("studentRoll").value="";
}

function markAttendance(status){

totalClasses++;

if(status==="present"){
presentClasses++;
}

updateAttendance();
}

function updateAttendance(){

let percentage = 0;

if(totalClasses>0){

percentage =
(presentClasses/totalClasses)*100;

}

document.getElementById("percentage")
.innerHTML =
percentage.toFixed(2)+"%";

}

function predictPresent(){

let days =
parseInt(document.getElementById("futureDays").value);

if(isNaN(days) || days<=0){

alert("Enter valid number");
return;

}

let futurePresent =
presentClasses + days;

let futureTotal =
totalClasses + days;

let result =
(futurePresent/futureTotal)*100;

document.getElementById("predictionResult")
.innerHTML =
"If All Present : "
+ result.toFixed(2) + "%";

}

function predictAbsent(){

let days =
parseInt(document.getElementById("futureDays").value);

if(isNaN(days) || days<=0){

alert("Enter valid number");
return;

}

let futureTotal =
totalClasses + days;

let result =
(presentClasses/futureTotal)*100;

document.getElementById("predictionResult")
.innerHTML =
"If All Absent : "
+ result.toFixed(2) + "%";

}

</script>

</body>
</html>
